name: Build
on:
  workflow_dispatch:
      inputs:
        package_name:
          description: "Package name of the game:"
          required: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 11
        cache: gradle

    - run: |
        chmod +x gradlew

        # 自动找到所有 module.gradle 并替换（不管在哪）
        find . -name "module.gradle" -type f -exec sed -i "s|moduleDescription = \"|moduleDescription = \"(${{ github.event.inputs.package_name }}) |g" {} +

        # 替换 game.h 包名
        find . -name "game.h" -type f -exec sed -i "s/com.game.packagename/${{ github.event.inputs.package_name }}/g" {} +

        # 编译
        ./gradlew module:assembleRelease
      shell: bash

    - uses: actions/upload-artifact@v4
      with:
        name: zygisk-module
        path: out/magisk_module_release/

